# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.ssh_private_key.kv"
pattern = "(?i)[\"\\'`]?((?:ssh_private_key|SSHз§ҳеҜҶйҚө))[\"\\'`]?\\s*[:=]\\s*[\"\\'`гҖҢгҖҺгҖҗ\\[]?(?:(?:-{5}BEGIN (?:OPENSSH |RSA |DSA |EC |ENCRYPTED )?PRIVATE KEY-{5}(?:\\\\r\\\\n|\\\\n|[A-Za-z0-9+/=\\s]){0,6000}-{5}END (?:OPENSSH |RSA |DSA |EC |ENCRYPTED )?PRIVATE KEY-{5})|(?:[A-Za-z0-9._~+/=@:%\\-]{16,300}))[\"\\'`гҖҚгҖҸгҖ‘\\]]?"
description = "SSHз§ҳеҜҶйҚө - JSON/YAML/envйўЁгӮӯгғјеҖӨ"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "ssh", "private_key"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
