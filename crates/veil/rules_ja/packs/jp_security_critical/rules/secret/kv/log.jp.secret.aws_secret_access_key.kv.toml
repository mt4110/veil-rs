# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.aws_secret_access_key.kv"
pattern = "(?i)[\"\\'`]?((?:AWS_SECRET_ACCESS_KEY|aws_secret_access_key|AWSシークレットアクセスキー))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"\\'`」』】\\]]?"
description = "AWSシークレットアクセスキー - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "aws"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
