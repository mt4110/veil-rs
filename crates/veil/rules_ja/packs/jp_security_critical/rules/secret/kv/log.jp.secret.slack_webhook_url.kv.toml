[[rules]]
id = "log.jp.secret.slack_webhook_url.kv"
pattern = "(?i)[\"\\'`]?((?:Slack[\\s　]*Webhook[\\s　]*URL|slack_webhook_url|incoming_webhook))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"\\'`」』】\\]]?"
description = "Slack Webhook URL - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "slack", "webhook"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
