# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.otp_code.kv"
pattern = "(?i)[\"\\'`]?((?:ワンタイムパスワード|otp_code|認証コード|OTP))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９][0-9０-９\\-\\s　]{3,39})[\"\\'`」』】\\]]?"
description = "ワンタイムパスワード - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "otp"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
