# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.oauth_client_secret.kv"
pattern = "(?i)[\"\\'`]?((?:oauth_client_secret|OAuthクライアントシークレット|client_secret))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"\\'`」』】\\]]?"
description = "OAuthクライアントシークレット - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "oauth"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
