# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.jwt.kv"
pattern = "(?i)[\"\\'`]?((?:Json[\\s　]*Web[\\s　]*Token|JWT|jwt))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:eyJ[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,})[\"\\'`」』】\\]]?"
description = "JWT - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "jwt"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
