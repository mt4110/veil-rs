# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.gitlab_token.kv"
pattern = "(?i)[\"\\'`]?((?:gitlab_token|GITLAB_TOKEN|GitLabトークン))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:glpat-[A-Za-z0-9_\\-]{20,200})[\"\\'`」』】\\]]?"
description = "GitLabトークン - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "gitlab"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
