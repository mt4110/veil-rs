# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.github_token.kv"
pattern = "(?i)[\"\\'`]?((?:github_token|GITHUB_TOKEN|GitHubトークン))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{20,200})[\"\\'`」』】\\]]?"
description = "GitHubトークン - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "github"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
