# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.debug_mode.lv"
pattern = "(?i)(?:debug_mode|デバッグモード|DEBUG)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:(?:true|false|有効|無効|許可|拒否|公開|非公開|全許可|制限なし|なし|あり|ON|OFF))[\"」』】\\]]?"
description = "デバッグモード - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "security"
tags = ["log", "jp", "security", "label_value", "debug"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
