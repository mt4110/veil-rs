# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.kubeconfig.lv"
pattern = "(?i)(?:Kubernetes設定|kubeconfig|k8s_config)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:(?:/[A-Za-z0-9._\\-]+){2,}(?:\\.[A-Za-z0-9]+)?)[\"」』】\\]]?"
description = "kubeconfig - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "security"
tags = ["log", "jp", "security", "label_value", "kubernetes"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
