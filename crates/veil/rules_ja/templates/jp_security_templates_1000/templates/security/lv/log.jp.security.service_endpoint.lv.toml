# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.service_endpoint.lv"
pattern = "(?i)(?:service_endpoint|サービスエンドポイント|APIエンドポイント)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"」』】\\]]?"
description = "サービスエンドポイント - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "security"
tags = ["log", "jp", "security", "label_value", "endpoint"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
