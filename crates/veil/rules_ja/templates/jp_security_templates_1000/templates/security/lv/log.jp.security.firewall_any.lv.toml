[[rules]]
id = "log.jp.security.firewall_any.lv"
pattern = "(?i)(?:firewall_any|全許可ファイアウォール|0\\.0\\.0\\.0/0)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:(?:0\\.0\\.0\\.0/0|::/0|[0-9]{1,3}(?:\\.[0-9]{1,3}){3}/[0-9]{1,2}))[\"」』】\\]]?"
description = "全許可ファイアウォール - 日本語ラベル付き値"
