# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.docker_registry_password.lv"
pattern = "(?i)(?:docker_registry_password|Docker[\\s　]*Registryパスワード)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"」』】\\]]?"
description = "Docker Registryパスワード - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "security"
tags = ["log", "jp", "security", "label_value", "docker"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
