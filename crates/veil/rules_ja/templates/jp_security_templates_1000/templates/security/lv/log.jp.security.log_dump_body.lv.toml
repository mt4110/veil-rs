# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.log_dump_body.lv"
pattern = "(?i)(?:log_dump_body|body_dump|リクエスト本文|レスポンス本文)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"」』】\\]]?"
description = "リクエスト本文ログ出力 - 日本語ラベル付き値"
severity = "high"
score = 88
base_score = 88
category = "security"
tags = ["log", "jp", "security", "label_value", "logging", "body_dump"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
