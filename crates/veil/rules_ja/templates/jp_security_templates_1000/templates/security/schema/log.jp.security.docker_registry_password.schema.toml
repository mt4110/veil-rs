[[rules]]
id = "log.jp.security.docker_registry_password.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:docker_registry_password|Docker[\\s　]*Registryパスワード)|(?:docker_registry_password|Docker[\\s　]*Registryパスワード)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "Docker Registryパスワード - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "security"
tags = ["log", "jp", "security", "schema_marker", "docker"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 0
context_lines_after = 0
