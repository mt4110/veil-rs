# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.debug_mode.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:debug_mode|デバッグモード|DEBUG)|(?:debug_mode|デバッグモード|DEBUG)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "デバッグモード - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "security"
tags = ["log", "jp", "security", "schema_marker", "debug"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 0
context_lines_after = 0
