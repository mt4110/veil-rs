# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.kubeconfig.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:Kubernetes設定|kubeconfig|k8s_config)|(?:Kubernetes設定|kubeconfig|k8s_config)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "kubeconfig - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "security"
tags = ["log", "jp", "security", "schema_marker", "kubernetes"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 0
context_lines_after = 0
