# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.root_password.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:root_password|rootパスワード)|(?:root_password|rootパスワード)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "rootパスワード - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "security"
tags = ["log", "jp", "security", "schema_marker", "root", "password"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 0
context_lines_after = 0
