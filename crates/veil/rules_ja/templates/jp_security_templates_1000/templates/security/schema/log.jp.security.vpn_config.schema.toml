# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.vpn_config.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:vpn_config|VPN接続情報|VPN設定)|(?:vpn_config|VPN接続情報|VPN設定)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "VPN設定 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "security"
tags = ["log", "jp", "security", "schema_marker", "vpn"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 0
context_lines_after = 0
