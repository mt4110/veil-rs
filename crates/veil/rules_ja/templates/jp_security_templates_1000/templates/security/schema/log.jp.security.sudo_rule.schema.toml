# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.sudo_rule.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:sudo_rule|sudo設定|sudo権限)|(?:sudo_rule|sudo設定|sudo権限)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "sudo設定 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "security"
tags = ["log", "jp", "security", "schema_marker", "sudo"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 0
context_lines_after = 0
