# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.kubeconfig.kv"
pattern = "(?i)[\"\\'`]?((?:Kubernetes設定|kubeconfig|k8s_config))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:(?:/[A-Za-z0-9._\\-]+){2,}(?:\\.[A-Za-z0-9]+)?)[\"\\'`」』】\\]]?"
description = "kubeconfig - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "security"
tags = ["log", "jp", "security", "key_value", "kubernetes"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
