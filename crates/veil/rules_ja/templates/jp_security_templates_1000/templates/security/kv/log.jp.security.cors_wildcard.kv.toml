# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.cors_wildcard.kv"
pattern = "(?i)[\"\\'`]?((?:Access\\-Control\\-Allow\\-Origin|cors_wildcard|CORSワイルドカード))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:(?:true|false|有効|無効|許可|拒否|公開|非公開|全許可|制限なし|なし|あり|ON|OFF))[\"\\'`」』】\\]]?"
description = "CORSワイルドカード - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "security"
tags = ["log", "jp", "security", "key_value", "cors"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
