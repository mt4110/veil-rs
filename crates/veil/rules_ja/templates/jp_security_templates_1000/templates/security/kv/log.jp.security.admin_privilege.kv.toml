[[rules]]
id = "log.jp.security.admin_privilege.kv"
pattern = "(?i)[\"\\'`]?((?:admin_privilege|administrator|admin権限|管理者権限))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:(?:true|false|有効|無効|許可|拒否|公開|非公開|全許可|制限なし|なし|あり|ON|OFF))[\"\\'`」』】\\]]?"
description = "管理者権限 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "security"
tags = ["log", "jp", "security", "key_value", "access_control"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
