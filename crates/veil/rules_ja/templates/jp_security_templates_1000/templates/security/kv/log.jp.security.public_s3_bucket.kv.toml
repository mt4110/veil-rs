pattern = "(?i)[\"\\'`]?((?:public_s3_bucket|公開S3バケット|S3公開))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"\\'`」』】\\]]?"
