# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.sudo_rule.kv"
pattern = "(?i)[\"\\'`]?((?:sudo_rule|sudo設定|sudo権限))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"\\'`」』】\\]]?"
description = "sudo設定 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "security"
tags = ["log", "jp", "security", "key_value", "sudo"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
