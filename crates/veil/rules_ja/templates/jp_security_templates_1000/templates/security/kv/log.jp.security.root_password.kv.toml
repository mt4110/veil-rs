# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.root_password.kv"
pattern = "(?i)[\"\\'`]?((?:root_password|rootパスワード))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"\\'`」』】\\]]?"
description = "rootパスワード - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "security"
tags = ["log", "jp", "security", "key_value", "root", "password"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
