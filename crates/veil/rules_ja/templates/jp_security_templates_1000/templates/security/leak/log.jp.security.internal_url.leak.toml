# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.internal_url.leak"
pattern = "(?i)(?:(?:internal_url|社内URL|内部URL)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:internal_url|社内URL|内部URL))"
description = "内部URL - ログ・通知・外部送信に出る漏えい兆候"
severity = "medium"
score = 64
base_score = 64
category = "security"
tags = ["log", "jp", "security", "leak_marker", "internal_url"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
