# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.security.security_group_open.leak"
pattern = "(?i)(?:(?:security_group_open|Security[\\s　]*Group全開放|セキュリティグループ全許可)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:security_group_open|Security[\\s　]*Group全開放|セキュリティグループ全許可))"
description = "Security Group全開放 - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "security"
tags = ["log", "jp", "security", "leak_marker", "aws", "security_group"]
placeholder = "<REDACTED:SECURITY>"
context_lines_before = 1
context_lines_after = 1
