# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.internal_transfer.kv"
pattern = "(?i)[\"\\'`]?((?:internal_transfer|異動情報|配置転換))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"\\'`」』】\\]]?"
description = "異動情報 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "hr"
tags = ["log", "jp", "hr", "key_value", "transfer"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
