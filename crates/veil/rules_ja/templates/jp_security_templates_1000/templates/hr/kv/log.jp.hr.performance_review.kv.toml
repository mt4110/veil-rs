# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.performance_review.kv"
pattern = "(?i)[\"\\'`]?((?:performance_review|評価結果|人事評価))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"\\'`」』】\\]]?"
description = "人事評価 - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "hr"
tags = ["log", "jp", "hr", "key_value", "review"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
