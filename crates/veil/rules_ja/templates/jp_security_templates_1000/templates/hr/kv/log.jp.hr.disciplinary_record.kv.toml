[[rules]]
id = "log.jp.hr.disciplinary_record.kv"
pattern = "(?i)[\"\\'`]?((?:disciplinary_record|懲戒記録|処分履歴))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"\\'`」』】\\]]?"
description = "懲戒記録 - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "hr"
tags = ["log", "jp", "hr", "key_value", "disciplinary"]
