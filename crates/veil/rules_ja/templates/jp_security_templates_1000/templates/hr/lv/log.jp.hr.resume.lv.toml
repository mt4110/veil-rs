[[rules]]
id = "log.jp.hr.resume.lv"
pattern = "(?i)(?:resume|職務経歴書|履歴書|cv)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"」』】\\]]?"
description = "履歴書 - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "hr"
tags = ["log", "jp", "hr", "label_value", "resume"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
