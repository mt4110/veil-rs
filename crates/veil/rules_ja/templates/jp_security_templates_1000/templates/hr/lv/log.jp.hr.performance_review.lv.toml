# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.performance_review.lv"
pattern = "(?i)(?:performance_review|評価結果|人事評価)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"」』】\\]]?"
description = "人事評価 - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "hr"
tags = ["log", "jp", "hr", "label_value", "review"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
