# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.hr_confidential_note.leak"
pattern = "(?i)(?:(?:hr_confidential_note|人事機密メモ|人事メモ)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:hr_confidential_note|人事機密メモ|人事メモ))"
description = "人事機密メモ - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "hr"
tags = ["log", "jp", "hr", "leak_marker", "confidential"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
