# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.disciplinary_record.leak"
pattern = "(?i)(?:(?:disciplinary_record|懲戒記録|処分履歴)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:disciplinary_record|懲戒記録|処分履歴))"
description = "懲戒記録 - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "hr"
tags = ["log", "jp", "hr", "leak_marker", "disciplinary"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
