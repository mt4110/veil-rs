# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.interview_note.leak"
pattern = "(?i)(?:(?:interview_note|面接評価|面接メモ)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:interview_note|面接評価|面接メモ))"
description = "面接メモ - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "hr"
tags = ["log", "jp", "hr", "leak_marker", "interview"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
