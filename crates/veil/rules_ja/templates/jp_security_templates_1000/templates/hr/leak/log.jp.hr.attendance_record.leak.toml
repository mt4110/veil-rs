# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.attendance_record.leak"
pattern = "(?i)(?:(?:attendance_record|出退勤記録|勤怠記録)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:attendance_record|出退勤記録|勤怠記録))"
description = "勤怠記録 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "hr"
tags = ["log", "jp", "hr", "leak_marker", "attendance"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
