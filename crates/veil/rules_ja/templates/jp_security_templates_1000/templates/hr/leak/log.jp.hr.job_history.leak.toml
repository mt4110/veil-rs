# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.job_history.leak"
pattern = "(?i)(?:(?:job_history|職務経歴|職歴)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:job_history|職務経歴|職歴))"
description = "職歴 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "hr"
tags = ["log", "jp", "hr", "leak_marker", "job_history"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
