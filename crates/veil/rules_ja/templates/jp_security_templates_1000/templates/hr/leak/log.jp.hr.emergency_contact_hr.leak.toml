# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.emergency_contact_hr.leak"
pattern = "(?i)(?:(?:employee_emergency_contact|従業員緊急連絡先|社員緊急連絡先)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:employee_emergency_contact|従業員緊急連絡先|社員緊急連絡先))"
description = "従業員緊急連絡先 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "hr"
tags = ["log", "jp", "hr", "leak_marker", "emergency_contact"]
placeholder = "<REDACTED:HR>"
context_lines_before = 1
context_lines_after = 1
