[[rules]]
id = "log.jp.hr.attendance_record.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:attendance_record|出退勤記録|勤怠記録)|(?:attendance_record|出退勤記録|勤怠記録)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "勤怠記録 - CSV/DBスキーマ上の機微カラム名"
