# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.internal_transfer.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:internal_transfer|異動情報|配置転換)|(?:internal_transfer|異動情報|配置転換)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "異動情報 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "hr"
tags = ["log", "jp", "hr", "schema_marker", "transfer"]
placeholder = "<REDACTED:HR>"
context_lines_before = 0
context_lines_after = 0
