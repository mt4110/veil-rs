# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.promotion_candidate.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:promotion_candidate|昇格候補|昇進候補)|(?:promotion_candidate|昇格候補|昇進候補)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "昇格候補 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "hr"
tags = ["log", "jp", "hr", "schema_marker", "promotion"]
placeholder = "<REDACTED:HR>"
context_lines_before = 0
context_lines_after = 0
