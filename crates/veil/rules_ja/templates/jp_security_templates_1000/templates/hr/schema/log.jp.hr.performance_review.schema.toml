# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.hr.performance_review.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:performance_review|評価結果|人事評価)|(?:performance_review|評価結果|人事評価)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "人事評価 - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "hr"
tags = ["log", "jp", "hr", "schema_marker", "review"]
placeholder = "<REDACTED:HR>"
context_lines_before = 0
context_lines_after = 0
