# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.unpublished_financials.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:unpublished_financials|未公開決算情報|未発表決算)|(?:unpublished_financials|未公開決算情報|未発表決算)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "未公開決算情報 - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "legal"
tags = ["log", "jp", "legal", "schema_marker", "insider", "finance"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 0
context_lines_after = 0
