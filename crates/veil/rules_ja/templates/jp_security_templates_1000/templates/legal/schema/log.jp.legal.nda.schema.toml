# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.nda.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:non_disclosure_agreement|秘密保持契約|NDA)|(?:non_disclosure_agreement|秘密保持契約|NDA)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "秘密保持契約 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "legal"
tags = ["log", "jp", "legal", "schema_marker", "nda"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 0
context_lines_after = 0
