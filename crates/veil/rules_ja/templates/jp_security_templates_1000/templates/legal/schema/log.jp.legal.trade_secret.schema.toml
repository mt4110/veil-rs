[[rules]]
id = "log.jp.legal.trade_secret.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:trade_secret|営業秘密|企業秘密)|(?:trade_secret|営業秘密|企業秘密)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "営業秘密 - CSV/DBスキーマ上の機微カラム名"
