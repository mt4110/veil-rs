[[rules]]
id = "log.jp.legal.contract_draft.kv"
pattern = "(?i)[\"\\'`]?((?:contract_draft|契約書ドラフト|契約草案))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"\\'`」』】\\]]?"
description = "契約書ドラフト - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "legal"
tags = ["log", "jp", "legal", "key_value", "contract"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
