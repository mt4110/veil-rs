# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.unpublished_financials.kv"
pattern = "(?i)[\"\\'`]?((?:unpublished_financials|未公開決算情報|未発表決算))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９,，]{3,}\\s*(?:円|JPY|万円|千円|億円)?)[\"\\'`」』】\\]]?"
description = "未公開決算情報 - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "legal"
tags = ["log", "jp", "legal", "key_value", "insider", "finance"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
