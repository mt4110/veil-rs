# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.incident_report.kv"
pattern = "(?i)[\"\\'`]?((?:incident_report|インシデント報告書|事故報告書))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"\\'`」』】\\]]?"
description = "インシデント報告書 - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "legal"
tags = ["log", "jp", "legal", "key_value", "incident"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
