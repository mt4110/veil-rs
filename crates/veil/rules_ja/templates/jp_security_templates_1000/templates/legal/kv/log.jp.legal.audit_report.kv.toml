# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.audit_report.kv"
pattern = "(?i)[\"\\'`]?((?:audit_report|内部監査報告|監査報告書))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"\\'`」』】\\]]?"
description = "監査報告書 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "legal"
tags = ["log", "jp", "legal", "key_value", "audit"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
