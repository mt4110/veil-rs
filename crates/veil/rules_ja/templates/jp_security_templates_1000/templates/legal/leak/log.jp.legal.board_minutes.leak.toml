[[rules]]
id = "log.jp.legal.board_minutes.leak"
pattern = "(?i)(?:(?:board_minutes|取締役会議事録|役員会議事録)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:board_minutes|取締役会議事録|役員会議事録))"
description = "取締役会議事録 - ログ・通知・外部送信に出る漏えい兆候"
