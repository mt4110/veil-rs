# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.whistleblower_report.leak"
pattern = "(?i)(?:(?:whistleblower_report|内部通報|公益通報)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:whistleblower_report|内部通報|公益通報))"
description = "内部通報 - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "legal"
tags = ["log", "jp", "legal", "leak_marker", "whistleblower"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
