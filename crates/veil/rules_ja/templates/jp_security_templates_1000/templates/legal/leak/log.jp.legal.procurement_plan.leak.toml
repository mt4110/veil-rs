# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.procurement_plan.leak"
pattern = "(?i)(?:(?:procurement_plan|調達計画|購買計画)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:procurement_plan|調達計画|購買計画))"
description = "調達計画 - ログ・通知・外部送信に出る漏えい兆候"
severity = "medium"
score = 64
base_score = 64
category = "legal"
tags = ["log", "jp", "legal", "leak_marker", "procurement"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
