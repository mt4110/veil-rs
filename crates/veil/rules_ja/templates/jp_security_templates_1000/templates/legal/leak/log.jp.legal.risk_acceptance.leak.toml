# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.risk_acceptance.leak"
pattern = "(?i)(?:(?:risk_acceptance|リスク許容|リスク受容)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:risk_acceptance|リスク許容|リスク受容))"
description = "リスク受容 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "legal"
tags = ["log", "jp", "legal", "leak_marker", "risk"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
