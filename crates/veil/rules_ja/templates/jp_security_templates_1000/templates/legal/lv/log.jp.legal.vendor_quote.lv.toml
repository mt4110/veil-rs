# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.vendor_quote.lv"
pattern = "(?i)(?:vendor_quote|ベンダー見積|見積情報)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[0-9０-９,，]{3,}\\s*(?:円|JPY|万円|千円|億円)?)[\"」』】\\]]?"
description = "見積情報 - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "legal"
tags = ["log", "jp", "legal", "label_value", "quote"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
