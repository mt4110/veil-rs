# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.trade_secret.lv"
pattern = "(?i)(?:trade_secret|営業秘密|企業秘密)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"」』】\\]]?"
description = "営業秘密 - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "legal"
tags = ["log", "jp", "legal", "label_value", "trade_secret"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
