# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.legal.incident_report.lv"
pattern = "(?i)(?:incident_report|インシデント報告書|事故報告書)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"」』】\\]]?"
description = "インシデント報告書 - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "legal"
tags = ["log", "jp", "legal", "label_value", "incident"]
placeholder = "<REDACTED:CONFIDENTIAL>"
context_lines_before = 1
context_lines_after = 1
