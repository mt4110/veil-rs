# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.card_cvv.lv"
pattern = "(?i)(?:セキュリティコード|card_cvv|CVV|CVC)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[0-9０-９]{3,4})[\"」』】\\]]?"
description = "セキュリティコード - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "finance"
tags = ["log", "jp", "finance", "label_value", "payment", "card", "cvv"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
