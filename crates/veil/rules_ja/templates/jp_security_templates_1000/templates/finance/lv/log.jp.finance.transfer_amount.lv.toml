# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.transfer_amount.lv"
pattern = "(?i)(?:transfer_amount|振込金額|送金金額)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[0-9０-９,，]{3,}\\s*(?:円|JPY|万円|千円|億円)?)[\"」』】\\]]?"
description = "振込金額 - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "finance"
tags = ["log", "jp", "finance", "label_value", "transfer", "amount"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
