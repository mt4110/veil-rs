# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.branch_code.lv"
pattern = "(?i)(?:branch_code|支店コード|店番)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[0-9０-９\\-\\s　]{4,40})[\"」』】\\]]?"
description = "支店コード - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "finance"
tags = ["log", "jp", "finance", "label_value", "bank", "branch"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
