# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.card_token.lv"
pattern = "(?i)(?:card_token|カードトークン)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"」』】\\]]?"
description = "カードトークン - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "finance"
tags = ["log", "jp", "finance", "label_value", "payment", "token"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
