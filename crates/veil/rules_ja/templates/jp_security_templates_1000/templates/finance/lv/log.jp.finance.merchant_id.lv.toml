[[rules]]
id = "log.jp.finance.merchant_id.lv"
pattern = "(?i)(?:merchant_id|加盟店ID|店舗ID)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
