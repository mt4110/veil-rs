[[rules]]
id = "log.jp.finance.crypto_wallet_address.lv"
pattern = "(?i)(?:crypto_wallet_address|wallet_address|ウォレットアドレス|暗号資産ウォレット)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"」』】\\]]?"
description = "暗号資産ウォレットアドレス - 日本語ラベル付き値"
severity = "high"
score = 88
base_score = 88
category = "finance"
tags = ["log", "jp", "finance", "label_value", "crypto", "wallet"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
