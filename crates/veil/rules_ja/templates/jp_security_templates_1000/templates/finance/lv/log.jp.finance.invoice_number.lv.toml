# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.invoice_number.lv"
pattern = "(?i)(?:invoice_number|インボイス番号|請求書番号)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
description = "請求書番号 - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "finance"
tags = ["log", "jp", "finance", "label_value", "invoice"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
