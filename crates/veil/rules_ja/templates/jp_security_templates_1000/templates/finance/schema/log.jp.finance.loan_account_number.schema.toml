[[rules]]
id = "log.jp.finance.loan_account_number.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:loan_account_number|ローン口座番号|借入口座番号)|(?:loan_account_number|ローン口座番号|借入口座番号)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "ローン口座番号 - CSV/DBスキーマ上の機微カラム名"
