[[rules]]
id = "log.jp.finance.ideco_number.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:ideco_number|iDeCo加入者番号|iDeCo番号)|(?:ideco_number|iDeCo加入者番号|iDeCo番号)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "iDeCo加入者番号 - CSV/DBスキーマ上の機微カラム名"
