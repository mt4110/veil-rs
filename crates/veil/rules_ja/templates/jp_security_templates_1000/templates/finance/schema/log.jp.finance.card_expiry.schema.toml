# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.card_expiry.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:expiration_date|card_expiry|カード有効期限|有効期限)|(?:expiration_date|card_expiry|カード有効期限|有効期限)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "カード有効期限 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "finance"
tags = ["log", "jp", "finance", "schema_marker", "payment", "card"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 0
context_lines_after = 0
