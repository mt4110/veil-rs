# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.transaction_id.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:transaction_id|tx_id|取引ID|取引番号)|(?:transaction_id|tx_id|取引ID|取引番号)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "取引ID - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "finance"
tags = ["log", "jp", "finance", "schema_marker", "transaction"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 0
context_lines_after = 0
