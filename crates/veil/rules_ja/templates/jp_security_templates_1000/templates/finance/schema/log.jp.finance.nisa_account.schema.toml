[[rules]]
id = "log.jp.finance.nisa_account.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:nisa_account|NISA番号|NISA口座)|(?:nisa_account|NISA番号|NISA口座)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "NISA口座 - CSV/DBスキーマ上の機微カラム名"
