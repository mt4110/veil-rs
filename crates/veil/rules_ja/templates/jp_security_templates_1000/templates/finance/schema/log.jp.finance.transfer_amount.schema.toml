[[rules]]
id = "log.jp.finance.transfer_amount.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:transfer_amount|振込金額|送金金額)|(?:transfer_amount|振込金額|送金金額)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "振込金額 - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "finance"
tags = ["log", "jp", "finance", "schema_marker", "transfer", "amount"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 0
context_lines_after = 0
