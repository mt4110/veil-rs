# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.settlement_id.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:settlement_id|精算番号|精算ID)|(?:settlement_id|精算番号|精算ID)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "精算ID - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "finance"
tags = ["log", "jp", "finance", "schema_marker", "settlement"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 0
context_lines_after = 0
