# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.aml_watchlist_flag.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:aml_watchlist_flag|AMLウォッチリスト|反社チェック)|(?:aml_watchlist_flag|AMLウォッチリスト|反社チェック)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "AMLウォッチリスト - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "finance"
tags = ["log", "jp", "finance", "schema_marker", "aml"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 0
context_lines_after = 0
