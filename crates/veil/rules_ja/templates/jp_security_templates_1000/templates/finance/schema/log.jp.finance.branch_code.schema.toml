[[rules]]
id = "log.jp.finance.branch_code.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:branch_code|支店コード|店番)|(?:branch_code|支店コード|店番)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "支店コード - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "finance"
tags = ["log", "jp", "finance", "schema_marker", "bank", "branch"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 0
context_lines_after = 0
