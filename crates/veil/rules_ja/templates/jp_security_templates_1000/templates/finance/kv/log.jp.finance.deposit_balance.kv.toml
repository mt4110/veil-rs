# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.deposit_balance.kv"
pattern = "(?i)[\"\\'`]?((?:deposit_balance|預金残高|口座残高))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９,，]{3,}\\s*(?:円|JPY|万円|千円|億円)?)[\"\\'`」』】\\]]?"
description = "預金残高 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "finance"
tags = ["log", "jp", "finance", "key_value", "balance"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
