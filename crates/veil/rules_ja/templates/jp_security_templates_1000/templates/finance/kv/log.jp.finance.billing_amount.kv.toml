[[rules]]
id = "log.jp.finance.billing_amount.kv"
pattern = "(?i)[\"\\'`]?((?:billing_amount|請求金額|課金額))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９,，]{3,}\\s*(?:円|JPY|万円|千円|億円)?)[\"\\'`」』】\\]]?"
description = "請求金額 - JSON/YAML/env風キー値"
severity = "medium"
score = 74
base_score = 74
category = "finance"
tags = ["log", "jp", "finance", "key_value", "billing", "amount"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
