# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.fraud_score.kv"
pattern = "(?i)[\"\\'`]?((?:fraud_score|risk_score|不正検知スコア))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９\\-\\s　]{4,40})[\"\\'`」』】\\]]?"
description = "不正検知スコア - JSON/YAML/env風キー値"
severity = "medium"
score = 74
base_score = 74
category = "finance"
tags = ["log", "jp", "finance", "key_value", "fraud"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
