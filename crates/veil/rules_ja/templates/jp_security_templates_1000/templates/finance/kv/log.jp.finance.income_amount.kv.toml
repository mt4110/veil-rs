[[rules]]
id = "log.jp.finance.income_amount.kv"
pattern = "(?i)[\"\\'`]?((?:income_amount|所得金額|収入額|年収))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９,，]{3,}\\s*(?:円|JPY|万円|千円|億円)?)[\"\\'`」』】\\]]?"
description = "所得金額 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "finance"
tags = ["log", "jp", "finance", "key_value", "income"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
