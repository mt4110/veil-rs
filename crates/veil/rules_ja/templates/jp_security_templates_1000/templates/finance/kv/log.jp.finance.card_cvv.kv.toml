# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.card_cvv.kv"
pattern = "(?i)[\"\\'`]?((?:セキュリティコード|card_cvv|CVV|CVC))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９]{3,4})[\"\\'`」』】\\]]?"
description = "セキュリティコード - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "finance"
tags = ["log", "jp", "finance", "key_value", "payment", "card", "cvv"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
