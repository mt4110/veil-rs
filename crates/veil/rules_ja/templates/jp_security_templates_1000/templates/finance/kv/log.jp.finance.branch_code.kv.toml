[[rules]]
id = "log.jp.finance.branch_code.kv"
pattern = "(?i)[\"\\'`]?((?:branch_code|支店コード|店番))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９\\-\\s　]{4,40})[\"\\'`」』】\\]]?"
description = "支店コード - JSON/YAML/env風キー値"
