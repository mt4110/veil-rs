# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.crypto_wallet_address.kv"
pattern = "(?i)[\"\\'`]?((?:crypto_wallet_address|wallet_address|ウォレットアドレス|暗号資産ウォレット))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"\\'`」』】\\]]?"
description = "暗号資産ウォレットアドレス - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "finance"
tags = ["log", "jp", "finance", "key_value", "crypto", "wallet"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
