[[rules]]
id = "log.jp.finance.receipt_number.kv"
pattern = "(?i)[\"\\'`]?((?:receipt_number|領収書番号))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
