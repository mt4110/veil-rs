# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.finance.card_cvv.leak"
pattern = "(?i)(?:(?:セキュリティコード|card_cvv|CVV|CVC)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:セキュリティコード|card_cvv|CVV|CVC))"
description = "セキュリティコード - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "finance"
tags = ["log", "jp", "finance", "leak_marker", "payment", "card", "cvv"]
placeholder = "<REDACTED:FINANCIAL>"
context_lines_before = 1
context_lines_after = 1
