# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.otp_code.lv"
pattern = "(?i)(?:ワンタイムパスワード|otp_code|認証コード|OTP)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[0-9０-９\\-\\s　]{4,40})[\"」』】\\]]?"
description = "ワンタイムパスワード - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "otp"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
