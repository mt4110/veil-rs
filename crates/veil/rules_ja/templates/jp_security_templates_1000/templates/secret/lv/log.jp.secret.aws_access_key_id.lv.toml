# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.aws_access_key_id.lv"
pattern = "(?i)(?:AWS_ACCESS_KEY_ID|aws_access_key_id|AWSアクセスキーID)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:(?:AKIA|ASIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA)[0-9A-Z]{16})[\"」』】\\]]?"
description = "AWSアクセスキーID - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "aws"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
