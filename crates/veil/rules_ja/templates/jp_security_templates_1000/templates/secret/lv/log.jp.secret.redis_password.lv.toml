# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.redis_password.lv"
pattern = "(?i)(?:redis_password|REDIS_PASSWORD|Redisパスワード)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"」』】\\]]?"
description = "Redisパスワード - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "redis"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
