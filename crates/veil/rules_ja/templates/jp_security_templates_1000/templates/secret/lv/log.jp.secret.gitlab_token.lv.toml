# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.gitlab_token.lv"
pattern = "(?i)(?:gitlab_token|GITLAB_TOKEN|GitLabトークン)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:glpat-[A-Za-z0-9_\\-]{20,200})[\"」』】\\]]?"
description = "GitLabトークン - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "gitlab"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
