# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.slack_webhook_url.lv"
pattern = "(?i)(?:Slack[\\s　]*Webhook[\\s　]*URL|slack_webhook_url|incoming_webhook)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"」』】\\]]?"
description = "Slack Webhook URL - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "slack", "webhook"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
