# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.api_key.lv"
pattern = "(?i)(?:API_KEY|api_key|apikey|APIキー)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"」』】\\]]?"
description = "APIキー - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "api_key"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
