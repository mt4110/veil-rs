# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.csrf_token.lv"
pattern = "(?i)(?:xsrf_token|csrf_token|CSRFトークン)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"」』】\\]]?"
description = "CSRFトークン - 日本語ラベル付き値"
severity = "high"
score = 88
base_score = 88
category = "secret"
tags = ["log", "jp", "secret", "label_value", "csrf"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
