# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.github_token.lv"
pattern = "(?i)(?:github_token|GITHUB_TOKEN|GitHubトークン)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{20,200})[\"」』】\\]]?"
description = "GitHubトークン - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "github"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
