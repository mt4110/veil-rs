# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.basic_auth.lv"
pattern = "(?i)(?:Authorization[\\s　]*Basic|basic_auth|Basic認証)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"」』】\\]]?"
description = "Basic認証情報 - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "basic_auth"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
