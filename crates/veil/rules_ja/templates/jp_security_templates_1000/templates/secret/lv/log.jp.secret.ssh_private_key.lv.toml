# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.ssh_private_key.lv"
pattern = "(?i)(?:ssh_private_key|SSH秘密鍵)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"」』】\\]]?"
description = "SSH秘密鍵 - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "ssh", "private_key"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
