# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.bearer_token.lv"
pattern = "(?i)(?:Authorization[\\s　]*Bearer|bearer_token|Bearerトークン)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"」』】\\]]?"
description = "Bearerトークン - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "token", "bearer"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
