# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.jwt.lv"
pattern = "(?i)(?:Json[\\s　]*Web[\\s　]*Token|JWT|jwt)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:eyJ[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,})[\"」』】\\]]?"
description = "JWT - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "secret"
tags = ["log", "jp", "secret", "label_value", "jwt"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
