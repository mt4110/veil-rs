# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.oauth_client_id.lv"
pattern = "(?i)(?:oauth_client_id|OAuthクライアントID|client_id)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"」』】\\]]?"
description = "OAuthクライアントID - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "secret"
tags = ["log", "jp", "secret", "label_value", "oauth", "client_id"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
