# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.aws_access_key_id.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:AWS_ACCESS_KEY_ID|aws_access_key_id|AWSアクセスキーID)|(?:AWS_ACCESS_KEY_ID|aws_access_key_id|AWSアクセスキーID)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "AWSアクセスキーID - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "secret"
tags = ["log", "jp", "secret", "schema_marker", "aws"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 0
context_lines_after = 0
