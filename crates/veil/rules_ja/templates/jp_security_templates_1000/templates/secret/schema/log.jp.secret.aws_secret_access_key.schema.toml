# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.aws_secret_access_key.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:AWS_SECRET_ACCESS_KEY|aws_secret_access_key|AWSシークレットアクセスキー)|(?:AWS_SECRET_ACCESS_KEY|aws_secret_access_key|AWSシークレットアクセスキー)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "AWSシークレットアクセスキー - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "secret"
tags = ["log", "jp", "secret", "schema_marker", "aws"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 0
context_lines_after = 0
