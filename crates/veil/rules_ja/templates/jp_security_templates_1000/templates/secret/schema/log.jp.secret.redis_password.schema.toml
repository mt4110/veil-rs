[[rules]]
id = "log.jp.secret.redis_password.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:redis_password|REDIS_PASSWORD|Redisパスワード)|(?:redis_password|REDIS_PASSWORD|Redisパスワード)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
