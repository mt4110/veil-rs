# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.csrf_token.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:xsrf_token|csrf_token|CSRFトークン)|(?:xsrf_token|csrf_token|CSRFトークン)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "CSRFトークン - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "secret"
tags = ["log", "jp", "secret", "schema_marker", "csrf"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 0
context_lines_after = 0
