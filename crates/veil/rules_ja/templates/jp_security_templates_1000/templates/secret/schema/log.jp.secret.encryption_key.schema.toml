# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.encryption_key.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:decryption_key|encryption_key|暗号化キー|復号キー)|(?:decryption_key|encryption_key|暗号化キー|復号キー)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "暗号化キー - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "secret"
tags = ["log", "jp", "secret", "schema_marker", "encryption"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 0
context_lines_after = 0
