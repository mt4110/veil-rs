# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.oauth_client_id.leak"
pattern = "(?i)(?:(?:oauth_client_id|OAuthクライアントID|client_id)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:oauth_client_id|OAuthクライアントID|client_id))"
description = "OAuthクライアントID - ログ・通知・外部送信に出る漏えい兆候"
severity = "medium"
score = 64
base_score = 64
category = "secret"
tags = ["log", "jp", "secret", "leak_marker", "oauth", "client_id"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
