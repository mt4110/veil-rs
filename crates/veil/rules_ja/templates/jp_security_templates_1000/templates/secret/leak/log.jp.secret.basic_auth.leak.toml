# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.basic_auth.leak"
pattern = "(?i)(?:(?:Authorization[\\s　]*Basic|basic_auth|Basic認証)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:Authorization[\\s　]*Basic|basic_auth|Basic認証))"
description = "Basic認証情報 - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "secret"
tags = ["log", "jp", "secret", "leak_marker", "basic_auth"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
