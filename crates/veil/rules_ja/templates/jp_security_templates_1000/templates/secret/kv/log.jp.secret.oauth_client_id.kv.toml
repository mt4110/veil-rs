[[rules]]
id = "log.jp.secret.oauth_client_id.kv"
pattern = "(?i)[\"\\'`]?((?:oauth_client_id|OAuthクライアントID|client_id))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"\\'`」』】\\]]?"
description = "OAuthクライアントID - JSON/YAML/env風キー値"
severity = "medium"
score = 74
base_score = 74
category = "secret"
tags = ["log", "jp", "secret", "key_value", "oauth", "client_id"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
