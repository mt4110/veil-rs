# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.encryption_key.kv"
pattern = "(?i)[\"\\'`]?((?:decryption_key|encryption_key|暗号化キー|復号キー))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"\\'`」』】\\]]?"
description = "暗号化キー - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "encryption"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
