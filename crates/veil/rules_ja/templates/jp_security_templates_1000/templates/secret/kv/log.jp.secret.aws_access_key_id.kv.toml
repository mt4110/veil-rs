# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.aws_access_key_id.kv"
pattern = "(?i)[\"\\'`]?((?:AWS_ACCESS_KEY_ID|aws_access_key_id|AWSアクセスキーID))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:(?:AKIA|ASIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA)[0-9A-Z]{16})[\"\\'`」』】\\]]?"
description = "AWSアクセスキーID - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "secret"
tags = ["log", "jp", "secret", "key_value", "aws"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
