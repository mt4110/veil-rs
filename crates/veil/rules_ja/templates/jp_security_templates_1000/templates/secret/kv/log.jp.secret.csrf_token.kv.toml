# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.secret.csrf_token.kv"
pattern = "(?i)[\"\\'`]?((?:xsrf_token|csrf_token|CSRFトークン))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{16,300})[\"\\'`」』】\\]]?"
description = "CSRFトークン - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "secret"
tags = ["log", "jp", "secret", "key_value", "csrf"]
placeholder = "<REDACTED:SECRET>"
context_lines_before = 1
context_lines_after = 1
