# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.fingerprint.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:fingerprint_template|fingerprint|指紋データ|指紋)|(?:fingerprint_template|fingerprint|指紋データ|指紋)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "指紋データ - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "biometric", "fingerprint"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
