# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.hanko_image.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:hanko_image|seal_image|ハンコ画像|印鑑画像|押印画像|印影)|(?:hanko_image|seal_image|ハンコ画像|印鑑画像|押印画像|印影)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "印影・ハンコ画像 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "identity", "hanko"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
