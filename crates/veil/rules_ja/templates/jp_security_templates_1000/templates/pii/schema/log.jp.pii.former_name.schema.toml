# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.former_name.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:maiden_name|former_name|改姓前氏名|旧氏名|旧名|旧姓)|(?:maiden_name|former_name|改姓前氏名|旧氏名|旧名|旧姓)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "旧姓・旧名 - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "identity", "name"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
