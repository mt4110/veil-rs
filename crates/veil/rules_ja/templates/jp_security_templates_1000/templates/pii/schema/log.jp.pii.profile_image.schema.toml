[[rules]]
id = "log.jp.pii.profile_image.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:profile_image|avatar_url|プロフィール画像|アバター画像|アイコン画像)|(?:profile_image|avatar_url|プロフィール画像|アバター画像|アイコン画像)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "プロフィール画像 - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "image"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
