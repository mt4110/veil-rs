# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.kana_name.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:kana_name|furigana|氏名カナ|フリガナ|ふりがな|カナ氏名|カナ名)|(?:kana_name|furigana|氏名カナ|フリガナ|ふりがな|カナ氏名|カナ名)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "氏名カナ - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "identity", "kana"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
