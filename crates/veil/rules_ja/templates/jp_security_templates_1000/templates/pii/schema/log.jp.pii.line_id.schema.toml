# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.line_id.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:line_user_id|LINEユーザーID|line_id|LINE[\\s　]*ID)|(?:line_user_id|LINEユーザーID|line_id|LINE[\\s　]*ID)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "LINE ID - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "sns", "line"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
