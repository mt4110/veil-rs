# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.ip_address.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:remote_addr|ip_address|アクセス元IP|IPアドレス|接続元IP)|(?:remote_addr|ip_address|アクセス元IP|IPアドレス|接続元IP)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "IPアドレス - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "network", "ip"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
