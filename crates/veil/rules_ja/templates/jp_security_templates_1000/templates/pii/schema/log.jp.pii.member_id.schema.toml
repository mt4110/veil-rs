[[rules]]
id = "log.jp.pii.member_id.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:membership_id|member_id|メンバーID|会員ID|会員番号)|(?:membership_id|member_id|メンバーID|会員ID|会員番号)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "会員番号 - CSV/DBスキーマ上の機微カラム名"
