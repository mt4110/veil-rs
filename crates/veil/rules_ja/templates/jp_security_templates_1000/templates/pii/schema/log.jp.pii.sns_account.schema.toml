# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.sns_account.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:Instagram[\\s　]*ID|sns_account|Twitter[\\s　]*ID|SNSアカウント|Xアカウント)|(?:Instagram[\\s　]*ID|sns_account|Twitter[\\s　]*ID|SNSアカウント|Xアカウント)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "SNSアカウント - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "sns", "account"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
