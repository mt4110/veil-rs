# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.birthdate.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:date_of_birth|birth_date|birthday|生年月日|生まれ|誕生日|dob)|(?:date_of_birth|birth_date|birthday|生年月日|生まれ|誕生日|dob)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "生年月日 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "identity", "birthdate"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
