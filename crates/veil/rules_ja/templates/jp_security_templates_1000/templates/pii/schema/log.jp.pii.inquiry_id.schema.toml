# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.inquiry_id.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:inquiry_id|ticket_id|問い合わせ番号|問合せ番号|照会番号)|(?:inquiry_id|ticket_id|問い合わせ番号|問合せ番号|照会番号)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "問い合わせ番号 - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "identifier", "support"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
