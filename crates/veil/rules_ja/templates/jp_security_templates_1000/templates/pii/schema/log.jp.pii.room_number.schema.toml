# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.room_number.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:room_number|unit_no|部屋番号|号室)|(?:room_number|unit_no|部屋番号|号室)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "部屋番号 - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "pii"
tags = ["log", "jp", "pii", "schema_marker", "contact", "address"]
placeholder = "<REDACTED:PII>"
context_lines_before = 0
context_lines_after = 0
