# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.handle_name.lv"
pattern = "(?i)(?:display_name|screen_name|nickname|ハンドルネーム|ニックネーム|表示名)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"」』】\\]]?"
description = "ハンドルネーム - 日本語ラベル付き値"
severity = "low"
score = 40
base_score = 40
category = "pii"
tags = ["log", "jp", "pii", "label_value", "identity", "screen_name"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
