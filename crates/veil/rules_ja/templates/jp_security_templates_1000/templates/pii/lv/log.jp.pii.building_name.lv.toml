[[rules]]
id = "log.jp.pii.building_name.lv"
pattern = "(?i)(?:building_name|マンション名|建物名|ビル名)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"」』】\\]]?"
description = "建物名 - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "pii"
tags = ["log", "jp", "pii", "label_value", "contact", "address"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
