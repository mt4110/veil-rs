# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.user_id.lv"
pattern = "(?i)(?:user_id|ユーザーID|利用者ID|ユーザID|uid)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
description = "ユーザーID - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "pii"
tags = ["log", "jp", "pii", "label_value", "identifier", "user"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
