[[rules]]
id = "log.jp.pii.mac_address.lv"
pattern = "(?i)(?:hardware_address|mac_address|MACアドレス)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})[\"」』】\\]]?"
