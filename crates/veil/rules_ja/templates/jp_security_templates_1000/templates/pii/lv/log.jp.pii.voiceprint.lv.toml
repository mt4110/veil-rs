# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.voiceprint.lv"
pattern = "(?i)(?:voice_embedding|voiceprint|音声特徴量|声紋データ|声紋)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"」』】\\]]?"
description = "声紋データ - 日本語ラベル付き値"
severity = "critical"
score = 95
base_score = 95
category = "pii"
tags = ["log", "jp", "pii", "label_value", "biometric", "voice"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
