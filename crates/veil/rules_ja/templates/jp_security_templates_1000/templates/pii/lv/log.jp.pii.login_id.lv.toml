# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.login_id.lv"
pattern = "(?i)(?:login_name|username|login_id|ログインID|ログイン名)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
description = "ログインID - 日本語ラベル付き値"
severity = "high"
score = 88
base_score = 88
category = "pii"
tags = ["log", "jp", "pii", "label_value", "identifier", "login"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
