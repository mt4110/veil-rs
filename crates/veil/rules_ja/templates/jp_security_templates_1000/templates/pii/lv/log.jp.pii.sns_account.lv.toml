# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.sns_account.lv"
pattern = "(?i)(?:Instagram[\\s　]*ID|sns_account|Twitter[\\s　]*ID|SNSアカウント|Xアカウント)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"」』】\\]]?"
description = "SNSアカウント - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "pii"
tags = ["log", "jp", "pii", "label_value", "sns", "account"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
