# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.line_id.lv"
pattern = "(?i)(?:line_user_id|LINEユーザーID|line_id|LINE[\\s　]*ID)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
description = "LINE ID - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "pii"
tags = ["log", "jp", "pii", "label_value", "sns", "line"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
