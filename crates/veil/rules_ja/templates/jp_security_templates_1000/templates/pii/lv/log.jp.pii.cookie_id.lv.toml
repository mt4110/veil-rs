# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.cookie_id.lv"
pattern = "(?i)(?:tracking_cookie|Cookie[\\s　]*ID|cookie_id|クッキーID)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"」』】\\]]?"
description = "Cookie ID - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "pii"
tags = ["log", "jp", "pii", "label_value", "web", "cookie"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
