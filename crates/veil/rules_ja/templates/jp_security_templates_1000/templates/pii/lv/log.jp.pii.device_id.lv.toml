# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.device_id.lv"
pattern = "(?i)(?:device_identifier|device_id|デバイスID|端末ID)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
description = "端末ID - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "pii"
tags = ["log", "jp", "pii", "label_value", "device", "identifier"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
