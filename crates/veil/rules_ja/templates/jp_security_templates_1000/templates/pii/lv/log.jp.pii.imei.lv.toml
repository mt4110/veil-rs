# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.imei.lv"
pattern = "(?i)(?:端末識別番号|IMEI|imei)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[0-9０-９\\-\\s　]{4,40})[\"」』】\\]]?"
description = "IMEI - 日本語ラベル付き値"
severity = "high"
score = 88
base_score = 88
category = "pii"
tags = ["log", "jp", "pii", "label_value", "device", "imei"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
