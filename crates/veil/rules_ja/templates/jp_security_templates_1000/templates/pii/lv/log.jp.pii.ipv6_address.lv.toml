[[rules]]
id = "log.jp.pii.ipv6_address.lv"
pattern = "(?i)(?:ipv6_address|IPv6アドレス|IPv6)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:(?:[0-9A-Fa-f]{1,4}:){2,7}[0-9A-Fa-f]{1,4})[\"」』】\\]]?"
description = "IPv6アドレス - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "pii"
tags = ["log", "jp", "pii", "label_value", "network", "ipv6"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
