# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.full_name.lv"
pattern = "(?i)(?:full_name|フルネーム|name|利用者名|顧客名|お名前|氏名|名前)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[ぁ-んァ-ヶ一-龠々〆〇ー・\\s　]{2,40})[\"」』】\\]]?"
description = "氏名 - 日本語ラベル付き値"
severity = "high"
score = 88
base_score = 88
category = "pii"
tags = ["log", "jp", "pii", "label_value", "identity", "name"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
