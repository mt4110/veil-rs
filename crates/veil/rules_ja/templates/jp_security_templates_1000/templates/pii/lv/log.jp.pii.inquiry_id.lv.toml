# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.inquiry_id.lv"
pattern = "(?i)(?:inquiry_id|ticket_id|問い合わせ番号|問合せ番号|照会番号)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
description = "問い合わせ番号 - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "pii"
tags = ["log", "jp", "pii", "label_value", "identifier", "support"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
