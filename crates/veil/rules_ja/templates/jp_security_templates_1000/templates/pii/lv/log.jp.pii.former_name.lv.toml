# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.former_name.lv"
pattern = "(?i)(?:maiden_name|former_name|改姓前氏名|旧氏名|旧名|旧姓)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[ぁ-んァ-ヶ一-龠々〆〇ー・\\s　]{2,40})[\"」』】\\]]?"
description = "旧姓・旧名 - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "pii"
tags = ["log", "jp", "pii", "label_value", "identity", "name"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
