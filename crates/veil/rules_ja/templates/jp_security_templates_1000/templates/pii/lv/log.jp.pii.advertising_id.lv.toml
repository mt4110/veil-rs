[[rules]]
id = "log.jp.pii.advertising_id.lv"
pattern = "(?i)(?:advertising_id|広告識別子|AAID|広告ID|IDFA)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"」』】\\]]?"
description = "広告ID - 日本語ラベル付き値"
