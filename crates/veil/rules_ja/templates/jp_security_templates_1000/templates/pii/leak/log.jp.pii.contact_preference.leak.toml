# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.contact_preference.leak"
pattern = "(?i)(?:(?:contact_preference|連絡可能時間|希望連絡先|連絡希望)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:contact_preference|連絡可能時間|希望連絡先|連絡希望))"
description = "連絡希望情報 - ログ・通知・外部送信に出る漏えい兆候"
severity = "low"
score = 32
base_score = 32
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "contact", "preference"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
