# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.voiceprint.leak"
pattern = "(?i)(?:(?:voice_embedding|voiceprint|音声特徴量|声紋データ|声紋)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:voice_embedding|voiceprint|音声特徴量|声紋データ|声紋))"
description = "声紋データ - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "biometric", "voice"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
