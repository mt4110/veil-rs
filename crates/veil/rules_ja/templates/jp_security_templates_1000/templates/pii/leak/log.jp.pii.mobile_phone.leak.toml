# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.mobile_phone.leak"
pattern = "(?i)(?:(?:mobile_number|mobile_phone|携帯電話番号|スマホ番号|携帯番号)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:mobile_number|mobile_phone|携帯電話番号|スマホ番号|携帯番号))"
description = "携帯電話番号 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "contact", "mobile"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
