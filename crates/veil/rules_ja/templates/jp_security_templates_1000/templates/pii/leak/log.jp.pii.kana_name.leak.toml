# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.kana_name.leak"
pattern = "(?i)(?:(?:kana_name|furigana|氏名カナ|フリガナ|ふりがな|カナ氏名|カナ名)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:kana_name|furigana|氏名カナ|フリガナ|ふりがな|カナ氏名|カナ名))"
description = "氏名カナ - ログ・通知・外部送信に出る漏えい兆候"
severity = "medium"
score = 64
base_score = 64
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "identity", "kana"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
