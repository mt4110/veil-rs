# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.emergency_phone.leak"
pattern = "(?i)(?:(?:emergency_phone|緊急連絡先電話番号|緊急連絡先TEL)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:emergency_phone|緊急連絡先電話番号|緊急連絡先TEL))"
description = "緊急連絡先電話番号 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "contact", "emergency"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
