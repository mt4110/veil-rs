# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.sns_account.leak"
pattern = "(?i)(?:(?:Instagram[\\s　]*ID|sns_account|Twitter[\\s　]*ID|SNSアカウント|Xアカウント)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:Instagram[\\s　]*ID|sns_account|Twitter[\\s　]*ID|SNSアカウント|Xアカウント))"
description = "SNSアカウント - ログ・通知・外部送信に出る漏えい兆候"
severity = "medium"
score = 64
base_score = 64
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "sns", "account"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
