# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.reservation_id.leak"
pattern = "(?i)(?:(?:reservation_id|booking_id|受付予約番号|予約ID|予約番号)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:reservation_id|booking_id|受付予約番号|予約ID|予約番号))"
description = "予約番号 - ログ・通知・外部送信に出る漏えい兆候"
severity = "medium"
score = 64
base_score = 64
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "identifier", "reservation"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
