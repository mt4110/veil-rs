# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.device_id.leak"
pattern = "(?i)(?:(?:device_identifier|device_id|デバイスID|端末ID)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:device_identifier|device_id|デバイスID|端末ID))"
description = "端末ID - ログ・通知・外部送信に出る漏えい兆候"
severity = "medium"
score = 64
base_score = 64
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "device", "identifier"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
