# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.biometric_face.leak"
pattern = "(?i)(?:(?:face_embedding|face_vector|顔認証データ|生体認証顔|顔特徴量)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:face_embedding|face_vector|顔認証データ|生体認証顔|顔特徴量))"
description = "顔認証データ - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "biometric", "face"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
