# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.customer_id.leak"
pattern = "(?i)(?:(?:customer_no|customer_id|cust_id|お客様番号|顧客ID|顧客番号)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:customer_no|customer_id|cust_id|お客様番号|顧客ID|顧客番号))"
description = "顧客ID - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "identifier", "customer"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
