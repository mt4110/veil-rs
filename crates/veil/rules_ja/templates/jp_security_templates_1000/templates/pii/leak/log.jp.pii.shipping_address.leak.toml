# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.shipping_address.leak"
pattern = "(?i)(?:(?:delivery_address|shipping_address|配送先住所|送付先住所|届け先住所)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:delivery_address|shipping_address|配送先住所|送付先住所|届け先住所))"
description = "配送先住所 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "pii"
tags = ["log", "jp", "pii", "leak_marker", "contact", "address", "shipping"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
