# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.room_number.kv"
pattern = "(?i)[\"\\'`]?((?:room_number|unit_no|部屋番号|号室))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "部屋番号 - JSON/YAML/env風キー値"
severity = "medium"
score = 74
base_score = 74
category = "pii"
tags = ["log", "jp", "pii", "key_value", "contact", "address"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
