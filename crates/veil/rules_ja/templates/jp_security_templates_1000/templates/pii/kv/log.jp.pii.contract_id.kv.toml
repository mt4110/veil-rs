# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.contract_id.kv"
pattern = "(?i)[\"\\'`]?((?:contract_id|contract_no|契約者番号|契約番号|契約ID))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "契約番号 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "pii"
tags = ["log", "jp", "pii", "key_value", "identifier", "contract"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
