# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.mypage_id.kv"
pattern = "(?i)[\"\\'`]?((?:portal_user_id|mypage_id|マイページID|マイページ番号))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "マイページID - JSON/YAML/env風キー値"
severity = "medium"
score = 74
base_score = 74
category = "pii"
tags = ["log", "jp", "pii", "key_value", "identifier", "portal"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
