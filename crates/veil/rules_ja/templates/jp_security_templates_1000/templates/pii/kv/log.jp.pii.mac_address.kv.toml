[[rules]]
id = "log.jp.pii.mac_address.kv"
pattern = "(?i)[\"\\'`]?((?:hardware_address|mac_address|MACアドレス))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})[\"\\'`」』】\\]]?"
description = "MACアドレス - JSON/YAML/env風キー値"
severity = "medium"
score = 74
base_score = 74
category = "pii"
tags = ["log", "jp", "pii", "key_value", "network", "mac"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
