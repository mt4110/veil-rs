[[rules]]
id = "log.jp.pii.lat_lon.kv"
pattern = "(?i)[\"\\'`]?((?:latitude_longitude|lat_lon|位置座標|緯度経度))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[+-]?[0-9０-９]{1,3}\\.[0-9０-９]{3,}\\s*,\\s*[+-]?[0-9０-９]{1,3}\\.[0-9０-９]{3,})[\"\\'`」』】\\]]?"
description = "緯度経度 - JSON/YAML/env風キー値"
