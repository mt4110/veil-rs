# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.biometric_face.kv"
pattern = "(?i)[\"\\'`]?((?:face_embedding|face_vector|顔認証データ|生体認証顔|顔特徴量))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"\\'`」』】\\]]?"
description = "顔認証データ - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "pii"
tags = ["log", "jp", "pii", "key_value", "biometric", "face"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
