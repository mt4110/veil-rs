[[rules]]
id = "log.jp.pii.user_id.kv"
pattern = "(?i)[\"\\'`]?((?:user_id|ユーザーID|利用者ID|ユーザID|uid))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
