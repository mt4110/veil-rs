# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.fingerprint.kv"
pattern = "(?i)[\"\\'`]?((?:fingerprint_template|fingerprint|指紋データ|指紋))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"\\'`」』】\\]]?"
description = "指紋データ - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "pii"
tags = ["log", "jp", "pii", "key_value", "biometric", "fingerprint"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
