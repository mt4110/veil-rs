# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.birthdate.kv"
pattern = "(?i)[\"\\'`]?((?:date_of_birth|birth_date|birthday|生年月日|生まれ|誕生日|dob))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９]{2,4}[年/\\-\\.][0-9０-９]{1,2}[月/\\-\\.]?[0-9０-９]{0,2}日?)[\"\\'`」』】\\]]?"
description = "生年月日 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "pii"
tags = ["log", "jp", "pii", "key_value", "identity", "birthdate"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
