# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.device_id.kv"
pattern = "(?i)[\"\\'`]?((?:device_identifier|device_id|デバイスID|端末ID))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "端末ID - JSON/YAML/env風キー値"
severity = "medium"
score = 74
base_score = 74
category = "pii"
tags = ["log", "jp", "pii", "key_value", "device", "identifier"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
