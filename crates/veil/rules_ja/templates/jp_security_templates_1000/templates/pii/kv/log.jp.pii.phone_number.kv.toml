# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.phone_number.kv"
pattern = "(?i)[\"\\'`]?((?:phone_number|固定電話|電話番号|tel|TEL))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:0[0-9０-９]{1,4}[-ー\\s　]?[0-9０-９]{1,4}[-ー\\s　]?[0-9０-９]{3,4})[\"\\'`」』】\\]]?"
description = "電話番号 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "pii"
tags = ["log", "jp", "pii", "key_value", "contact", "phone"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
