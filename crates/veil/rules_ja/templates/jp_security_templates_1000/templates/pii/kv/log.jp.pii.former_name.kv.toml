# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.former_name.kv"
pattern = "(?i)[\"\\'`]?((?:maiden_name|former_name|改姓前氏名|旧氏名|旧名|旧姓))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[ぁ-んァ-ヶ一-龠々〆〇ー・\\s　]{2,40})[\"\\'`」』】\\]]?"
description = "旧姓・旧名 - JSON/YAML/env風キー値"
severity = "medium"
score = 74
base_score = 74
category = "pii"
tags = ["log", "jp", "pii", "key_value", "identity", "name"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
