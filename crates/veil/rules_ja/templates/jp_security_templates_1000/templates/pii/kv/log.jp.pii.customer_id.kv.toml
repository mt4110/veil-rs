[[rules]]
id = "log.jp.pii.customer_id.kv"
pattern = "(?i)[\"\\'`]?((?:customer_no|customer_id|cust_id|お客様番号|顧客ID|顧客番号))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "顧客ID - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "pii"
tags = ["log", "jp", "pii", "key_value", "identifier", "customer"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
