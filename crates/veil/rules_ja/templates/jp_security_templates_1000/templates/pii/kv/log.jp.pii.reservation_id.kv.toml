[[rules]]
id = "log.jp.pii.reservation_id.kv"
pattern = "(?i)[\"\\'`]?((?:reservation_id|booking_id|受付予約番号|予約ID|予約番号))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "予約番号 - JSON/YAML/env風キー値"
severity = "medium"
score = 74
base_score = 74
category = "pii"
tags = ["log", "jp", "pii", "key_value", "identifier", "reservation"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
