# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.orderer_name.kv"
pattern = "(?i)[\"\\'`]?((?:orderer_name|buyer_name|注文者名|発注者名|購入者名))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[ぁ-んァ-ヶ一-龠々〆〇ー・\\s　]{2,40})[\"\\'`」』】\\]]?"
description = "注文者名 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "pii"
tags = ["log", "jp", "pii", "key_value", "identity", "commerce"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
