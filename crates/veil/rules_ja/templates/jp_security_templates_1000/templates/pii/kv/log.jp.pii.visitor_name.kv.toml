# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.visitor_name.kv"
pattern = "(?i)[\"\\'`]?((?:visitor_name|入館者氏名|来訪者氏名|来客名))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[ぁ-んァ-ヶ一-龠々〆〇ー・\\s　]{2,40})[\"\\'`」』】\\]]?"
description = "来訪者氏名 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "pii"
tags = ["log", "jp", "pii", "key_value", "identity", "visitor"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
