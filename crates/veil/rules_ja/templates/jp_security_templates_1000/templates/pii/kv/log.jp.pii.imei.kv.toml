# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.pii.imei.kv"
pattern = "(?i)[\"\\'`]?((?:端末識別番号|IMEI|imei))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９\\-\\s　]{4,40})[\"\\'`」』】\\]]?"
description = "IMEI - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "pii"
tags = ["log", "jp", "pii", "key_value", "device", "imei"]
placeholder = "<REDACTED:PII>"
context_lines_before = 1
context_lines_after = 1
