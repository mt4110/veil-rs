[[rules]]
id = "log.jp.government.mynumber_card.lv"
pattern = "(?i)(?:my_number_card|マイナンバーカード|個人番号カード)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
