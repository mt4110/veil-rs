# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.government.vaccination_record_number.lv"
pattern = "(?i)(?:vaccination_record_number|予防接種番号|接種券番号)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
description = "接種券番号 - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "government"
tags = ["log", "jp", "government", "label_value", "vaccination"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 1
context_lines_after = 1
