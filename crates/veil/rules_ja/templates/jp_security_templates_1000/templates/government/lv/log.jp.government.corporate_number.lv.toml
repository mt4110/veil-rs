# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.government.corporate_number.lv"
pattern = "(?i)(?:corporate_number|法人番号)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[0-9０-９\\-\\s　]{4,40})[\"」』】\\]]?"
description = "法人番号 - 日本語ラベル付き値"
severity = "medium"
score = 72
base_score = 72
category = "government"
tags = ["log", "jp", "government", "label_value", "corporate"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 1
context_lines_after = 1
