[[rules]]
id = "log.jp.government.municipal_user_number.leak"
pattern = "(?i)(?:(?:municipal_user_number|自治体利用者番号|自治体ID)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:municipal_user_number|自治体利用者番号|自治体ID))"
description = "自治体利用者番号 - ログ・通知・外部送信に出る漏えい兆候"
severity = "medium"
score = 64
base_score = 64
category = "government"
tags = ["log", "jp", "government", "leak_marker", "municipality"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 1
context_lines_after = 1
