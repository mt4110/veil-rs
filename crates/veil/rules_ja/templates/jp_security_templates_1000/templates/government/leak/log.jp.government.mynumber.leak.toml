# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.government.mynumber.leak"
pattern = "(?i)(?:(?:individual_number|my_number|マイナンバー|個人番号)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:individual_number|my_number|マイナンバー|個人番号))"
description = "マイナンバー - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "government"
tags = ["log", "jp", "government", "leak_marker", "mynumber"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 1
context_lines_after = 1
