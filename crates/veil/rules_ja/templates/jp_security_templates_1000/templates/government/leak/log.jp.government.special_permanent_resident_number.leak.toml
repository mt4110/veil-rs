[[rules]]
id = "log.jp.government.special_permanent_resident_number.leak"
pattern = "(?i)(?:(?:special_permanent_resident_number|特別永住者証明書番号|特永証明書番号)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:special_permanent_resident_number|特別永住者証明書番号|特永証明書番号))"
description = "特別永住者証明書番号 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "government"
tags = ["log", "jp", "government", "leak_marker", "residence"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 1
context_lines_after = 1
