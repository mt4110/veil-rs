# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.government.vaccination_record_number.leak"
pattern = "(?i)(?:(?:vaccination_record_number|予防接種番号|接種券番号)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:vaccination_record_number|予防接種番号|接種券番号))"
description = "接種券番号 - ログ・通知・外部送信に出る漏えい兆候"
severity = "medium"
score = 64
base_score = 64
category = "government"
tags = ["log", "jp", "government", "leak_marker", "vaccination"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 1
context_lines_after = 1
