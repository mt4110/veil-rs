# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.government.nursing_care_number.leak"
pattern = "(?i)(?:(?:nursing_care_number|介護保険被保険者番号|介護保険番号)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:nursing_care_number|介護保険被保険者番号|介護保険番号))"
description = "介護保険番号 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "government"
tags = ["log", "jp", "government", "leak_marker", "care"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 1
context_lines_after = 1
