[[rules]]
id = "log.jp.government.corporate_number.kv"
pattern = "(?i)[\"\\'`]?((?:corporate_number|法人番号))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[0-9０-９\\-\\s　]{4,40})[\"\\'`」』】\\]]?"
