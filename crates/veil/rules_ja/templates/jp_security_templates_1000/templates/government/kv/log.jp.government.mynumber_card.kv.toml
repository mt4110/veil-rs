[[rules]]
id = "log.jp.government.mynumber_card.kv"
pattern = "(?i)[\"\\'`]?((?:my_number_card|マイナンバーカード|個人番号カード))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
