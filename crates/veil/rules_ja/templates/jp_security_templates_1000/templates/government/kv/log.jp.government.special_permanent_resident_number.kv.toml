[[rules]]
id = "log.jp.government.special_permanent_resident_number.kv"
pattern = "(?i)[\"\\'`]?((?:special_permanent_resident_number|特別永住者証明書番号|特永証明書番号))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "特別永住者証明書番号 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "government"
tags = ["log", "jp", "government", "key_value", "residence"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 1
context_lines_after = 1
