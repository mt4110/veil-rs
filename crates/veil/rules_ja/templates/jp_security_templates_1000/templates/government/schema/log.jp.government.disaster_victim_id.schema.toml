# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.government.disaster_victim_id.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:disaster_victim_id|被災者番号|罹災者番号)|(?:disaster_victim_id|被災者番号|罹災者番号)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "罹災者番号 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "government"
tags = ["log", "jp", "government", "schema_marker", "disaster"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 0
context_lines_after = 0
