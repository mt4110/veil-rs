# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.government.corporate_number.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:corporate_number|法人番号)|(?:corporate_number|法人番号)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "法人番号 - CSV/DBスキーマ上の機微カラム名"
severity = "medium"
score = 54
base_score = 54
category = "government"
tags = ["log", "jp", "government", "schema_marker", "corporate"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 0
context_lines_after = 0
