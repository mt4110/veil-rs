# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.government.mynumber_card.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:my_number_card|マイナンバーカード|個人番号カード)|(?:my_number_card|マイナンバーカード|個人番号カード)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "マイナンバーカード - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "government"
tags = ["log", "jp", "government", "schema_marker", "mynumber_card"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 0
context_lines_after = 0
