# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.government.mynumber.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:individual_number|my_number|マイナンバー|個人番号)|(?:individual_number|my_number|マイナンバー|個人番号)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "マイナンバー - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "government"
tags = ["log", "jp", "government", "schema_marker", "mynumber"]
placeholder = "<REDACTED:GOVERNMENT>"
context_lines_before = 0
context_lines_after = 0
