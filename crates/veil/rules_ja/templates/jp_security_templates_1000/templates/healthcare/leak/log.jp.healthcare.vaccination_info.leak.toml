# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.vaccination_info.leak"
pattern = "(?i)(?:(?:vaccination_info|ワクチン接種情報|予防接種履歴)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:vaccination_info|ワクチン接種情報|予防接種履歴))"
description = "ワクチン接種情報 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "healthcare"
tags = ["log", "jp", "healthcare", "leak_marker", "vaccination"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 1
context_lines_after = 1
