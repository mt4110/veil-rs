# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.medication_name.leak"
pattern = "(?i)(?:(?:medication_name|服薬情報|処方薬|薬剤名)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:medication_name|服薬情報|処方薬|薬剤名))"
description = "薬剤名 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "healthcare"
tags = ["log", "jp", "healthcare", "leak_marker", "medication"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 1
context_lines_after = 1
