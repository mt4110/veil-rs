# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.care_level.leak"
pattern = "(?i)(?:(?:care_level|要支援区分|要介護度)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:care_level|要支援区分|要介護度))"
description = "要介護度 - ログ・通知・外部送信に出る漏えい兆候"
severity = "high"
score = 80
base_score = 80
category = "healthcare"
tags = ["log", "jp", "healthcare", "leak_marker", "care"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 1
context_lines_after = 1
