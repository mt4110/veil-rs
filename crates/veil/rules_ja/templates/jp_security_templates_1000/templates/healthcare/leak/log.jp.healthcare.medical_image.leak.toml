# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.medical_image.leak"
pattern = "(?i)(?:(?:medical_image|レントゲン画像|MRI画像|医用画像)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:medical_image|レントゲン画像|MRI画像|医用画像))"
description = "医用画像 - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "healthcare"
tags = ["log", "jp", "healthcare", "leak_marker", "image"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 1
context_lines_after = 1
