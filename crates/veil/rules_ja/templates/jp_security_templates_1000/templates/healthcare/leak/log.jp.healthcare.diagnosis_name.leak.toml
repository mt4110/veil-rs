# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.diagnosis_name.leak"
pattern = "(?i)(?:(?:diagnosis_name|診断名|病名)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:diagnosis_name|診断名|病名))"
description = "診断名 - ログ・通知・外部送信に出る漏えい兆候"
severity = "critical"
score = 87
base_score = 87
category = "healthcare"
tags = ["log", "jp", "healthcare", "leak_marker", "diagnosis"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 1
context_lines_after = 1
