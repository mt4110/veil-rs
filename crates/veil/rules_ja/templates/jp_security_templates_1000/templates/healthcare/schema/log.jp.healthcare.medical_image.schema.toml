# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.medical_image.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:medical_image|レントゲン画像|MRI画像|医用画像)|(?:medical_image|レントゲン画像|MRI画像|医用画像)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "医用画像 - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "healthcare"
tags = ["log", "jp", "healthcare", "schema_marker", "image"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 0
context_lines_after = 0
