# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.vaccination_info.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:vaccination_info|ワクチン接種情報|予防接種履歴)|(?:vaccination_info|ワクチン接種情報|予防接種履歴)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "ワクチン接種情報 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "healthcare"
tags = ["log", "jp", "healthcare", "schema_marker", "vaccination"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 0
context_lines_after = 0
