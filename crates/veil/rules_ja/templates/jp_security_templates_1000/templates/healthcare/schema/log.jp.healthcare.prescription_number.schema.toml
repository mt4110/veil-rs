# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.prescription_number.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:prescription_number|処方箋番号|処方番号)|(?:prescription_number|処方箋番号|処方番号)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "処方箋番号 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "healthcare"
tags = ["log", "jp", "healthcare", "schema_marker", "prescription"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 0
context_lines_after = 0
