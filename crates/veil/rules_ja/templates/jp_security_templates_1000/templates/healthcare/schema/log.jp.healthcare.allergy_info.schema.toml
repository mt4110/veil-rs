[[rules]]
id = "log.jp.healthcare.allergy_info.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:allergy_info|アレルギー情報|アレルギー)|(?:allergy_info|アレルギー情報|アレルギー)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "アレルギー情報 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "healthcare"
tags = ["log", "jp", "healthcare", "schema_marker", "allergy"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 0
context_lines_after = 0
