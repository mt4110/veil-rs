# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.lab_result.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:lab_result|血液検査結果|検査結果)|(?:lab_result|血液検査結果|検査結果)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "検査結果 - CSV/DBスキーマ上の機微カラム名"
severity = "critical"
score = 77
base_score = 77
category = "healthcare"
tags = ["log", "jp", "healthcare", "schema_marker", "lab"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 0
context_lines_after = 0
