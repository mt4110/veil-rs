# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.medication_name.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:medication_name|服薬情報|処方薬|薬剤名)|(?:medication_name|服薬情報|処方薬|薬剤名)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "薬剤名 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "healthcare"
tags = ["log", "jp", "healthcare", "schema_marker", "medication"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 0
context_lines_after = 0
