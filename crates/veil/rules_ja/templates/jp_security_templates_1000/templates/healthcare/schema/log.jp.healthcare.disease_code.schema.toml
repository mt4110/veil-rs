[[rules]]
id = "log.jp.healthcare.disease_code.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:disease_code|傷病名コード|疾病コード)|(?:disease_code|傷病名コード|疾病コード)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "傷病名コード - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "healthcare"
tags = ["log", "jp", "healthcare", "schema_marker", "disease_code"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 0
context_lines_after = 0
