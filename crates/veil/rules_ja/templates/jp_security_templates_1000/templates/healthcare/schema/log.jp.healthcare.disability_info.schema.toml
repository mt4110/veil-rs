[[rules]]
id = "log.jp.healthcare.disability_info.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:disability_info|障害情報|障害名)|(?:disability_info|障害情報|障害名)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "障害情報 - CSV/DBスキーマ上の機微カラム名"
