# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.medical_record_number.kv"
pattern = "(?i)[\"\\'`]?((?:medical_record_number|診察券番号|カルテ番号))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "診察券番号 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "healthcare"
tags = ["log", "jp", "healthcare", "key_value", "medical", "identifier"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 1
context_lines_after = 1
