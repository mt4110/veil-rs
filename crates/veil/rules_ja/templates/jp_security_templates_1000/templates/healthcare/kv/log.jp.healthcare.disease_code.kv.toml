# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.disease_code.kv"
pattern = "(?i)[\"\\'`]?((?:disease_code|傷病名コード|疾病コード))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "傷病名コード - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "healthcare"
tags = ["log", "jp", "healthcare", "key_value", "disease_code"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 1
context_lines_after = 1
