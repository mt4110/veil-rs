[[rules]]
id = "log.jp.healthcare.prescription_number.kv"
pattern = "(?i)[\"\\'`]?((?:prescription_number|処方箋番号|処方番号))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
