[[rules]]
id = "log.jp.healthcare.diagnosis_name.kv"
pattern = "(?i)[\"\\'`]?((?:diagnosis_name|診断名|病名))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９ぁ-んァ-ヶ一-龠々〆〇ー・（）()\\[\\]＿_\\-]{2,120})[\"\\'`」』】\\]]?"
description = "診断名 - JSON/YAML/env風キー値"
severity = "critical"
score = 97
base_score = 97
category = "healthcare"
tags = ["log", "jp", "healthcare", "key_value", "diagnosis"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 1
context_lines_after = 1
