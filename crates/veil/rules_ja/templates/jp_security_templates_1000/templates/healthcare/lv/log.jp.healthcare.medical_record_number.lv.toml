# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.healthcare.medical_record_number.lv"
pattern = "(?i)(?:medical_record_number|診察券番号|カルテ番号)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"」』】\\]]?"
description = "診察券番号 - 日本語ラベル付き値"
severity = "high"
score = 88
base_score = 88
category = "healthcare"
tags = ["log", "jp", "healthcare", "label_value", "medical", "identifier"]
placeholder = "<REDACTED:HEALTH>"
context_lines_before = 1
context_lines_after = 1
