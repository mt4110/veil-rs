[[rules]]
id = "log.jp.healthcare.genetic_info.lv"
pattern = "(?i)(?:genetic_info|ゲノム情報|遺伝情報)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:[A-Za-z0-9._~+/=@:%\\-]{8,240})[\"」』】\\]]?"
