# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.education.homeroom.leak"
pattern = "(?i)(?:(?:homeroom|クラス|学級|組)[^\\r\\n]{0,48}(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)|(?:ログ出力|ログ記録|監査ログ|エラーログ|デバッグログ|表示|出力|送信|通知|メール送信|Slack通知|外部送信|dump|print|trace|debug|log)[^\\r\\n]{0,48}(?:homeroom|クラス|学級|組))"
description = "クラス・組 - ログ・通知・外部送信に出る漏えい兆候"
severity = "low"
score = 32
base_score = 32
category = "education"
tags = ["log", "jp", "education", "leak_marker", "class"]
placeholder = "<REDACTED:EDUCATION>"
context_lines_before = 1
context_lines_after = 1
