# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.education.transcript.lv"
pattern = "(?i)(?:transcript|単位修得証明書|成績証明書)[\\s　]*(?:[:：=＝]|=>|->|は|：|[\\s　]+)[\\s　]*[\"「『【\\[]?(?:https?://[^\\s　<>\"\\)）\\]\\}]+)[\"」』】\\]]?"
description = "成績証明書 - 日本語ラベル付き値"
severity = "high"
score = 88
base_score = 88
category = "education"
tags = ["log", "jp", "education", "label_value", "transcript"]
placeholder = "<REDACTED:EDUCATION>"
context_lines_before = 1
context_lines_after = 1
