# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.education.transcript.schema"
pattern = "(?i)(?:(?:列名|カラム|フィールド|ヘッダー|CSV|DB|テーブル|table|column|field|schema|スキーマ)[^\\r\\n]{0,40}(?:transcript|単位修得証明書|成績証明書)|(?:transcript|単位修得証明書|成績証明書)[^\\r\\n]{0,24}(?:列|カラム|フィールド|ヘッダー|column|field))"
description = "成績証明書 - CSV/DBスキーマ上の機微カラム名"
severity = "high"
score = 70
base_score = 70
category = "education"
tags = ["log", "jp", "education", "schema_marker", "transcript"]
placeholder = "<REDACTED:EDUCATION>"
context_lines_before = 0
context_lines_after = 0
