# JP security-risk detection template.
# Generated as one-rule TOML for selective adoption and easy deletion.

[[rules]]
id = "log.jp.education.student_id.kv"
pattern = "(?i)[\"\\'`]?((?:student_id|学生番号|学籍番号))[\"\\'`]?\\s*[:=]\\s*[\"\\'`「『【\\[]?(?:[A-Za-z0-9０-９_\\-]{4,80})[\"\\'`」』】\\]]?"
description = "学籍番号 - JSON/YAML/env風キー値"
severity = "high"
score = 90
base_score = 90
category = "education"
tags = ["log", "jp", "education", "key_value", "student"]
placeholder = "<REDACTED:EDUCATION>"
context_lines_before = 1
context_lines_after = 1
